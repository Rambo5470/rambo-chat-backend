<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rambo Bikes — CS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;}
.hdr{background:#1b1b1b;padding:16px 28px;display:flex;align-items:center;gap:12px;}
.hdr h1{color:#fff;font-size:18px;font-weight:700;}
.badge{background:#cc0000;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.sub{color:#888;font-size:11px;margin-left:auto;}
.wrap{max-width:1400px;margin:0 auto;padding:20px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.kpi-l{font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.kpi-v{font-size:30px;font-weight:800;}
.kpi-s{font-size:11px;color:#aaa;margin-top:3px;}
.green{color:#16a34a;}.red{color:#cc0000;}
.row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.card h3{font-size:13px;font-weight:700;margin-bottom:14px;}
.rep{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.rn{font-size:12px;font-weight:600;min-width:80px;}
.rb{flex:1;margin:0 10px;height:7px;background:#f0f2f5;border-radius:4px;overflow:hidden;}
.rf{height:100%;background:#1b1b1b;border-radius:4px;}
.rc{font-size:12px;color:#888;min-width:28px;text-align:right;}
.foot{text-align:center;padding:16px;color:#ccc;font-size:11px;}
.loading{text-align:center;padding:60px;color:#aaa;font-size:15px;}
@media(max-width:800px){.kpis{grid-template-columns:repeat(2,1fr);}.row,.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="hdr">
  <div style="width:30px;height:30px;background:#cc0000;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px;">R</div>
  <h1>Rambo Bikes CS Dashboard</h1>
  <span class="badge">LIVE</span>
  <div class="sub" id="updated">Loading…</div>
</div>

<div class="wrap" id="main-content">
  <div class="loading">⏳ Loading live data from NetSuite…</div>
</div>

<div class="foot" id="footer">Rambo Bikes CS · Powered by NetSuite · <span id="gen-time"></span></div>

<script>
const API = window.location.origin + "/stats";

async function load() {
  try {
    const res = await fetch(API);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    render(d);
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="loading" style="color:#cc0000">⚠️ Failed to load data: ${e.message}<br><br><button onclick="load()" style="margin-top:12px;padding:8px 20px;background:#1b1b1b;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">Retry</button></div>`;
  }
}

function render(d) {
  document.getElementById("updated").textContent = "Last 30 days · NetSuite · " + new Date().toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"});
  document.getElementById("gen-time").textContent = d.generated_at || "";

  document.getElementById("main-content").innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="kpi-l">Total Cases (30d)</div><div class="kpi-v">${d.total_30d.toLocaleString()}</div><div class="kpi-s">~${(d.total_30d/30).toFixed(1)}/day avg</div></div>
      <div class="kpi"><div class="kpi-l">Resolution Rate</div><div class="kpi-v green">${d.resolution_pct}%</div><div class="kpi-s">${d.closed_cases.toLocaleString()} closed</div></div>
      <div class="kpi"><div class="kpi-l">Open Cases</div><div class="kpi-v red">${d.open_cases}</div><div class="kpi-s">Need attention</div></div>
      <div class="kpi"><div class="kpi-l">Chat Cases</div><div class="kpi-v">${d.chat_cases}</div><div class="kpi-s">${d.total_30d ? (d.chat_cases/d.total_30d*100).toFixed(1) : 0}% of total</div></div>
      <div class="kpi"><div class="kpi-l">Today</div><div class="kpi-v" id="today-kpi">—</div><div class="kpi-s">cases so far</div></div>
    </div>
    <div class="row">
      <div class="card"><h3>📈 Daily Volume — Last 14 Days</h3><canvas id="dc" height="90"></canvas></div>
      <div class="card"><h3>🍩 Status Breakdown</h3><canvas id="sc" height="180"></canvas></div>
    </div>
    <div class="row2">
      <div class="card"><h3>🏷️ Top Issue Categories</h3><canvas id="tc" height="160"></canvas></div>
      <div class="card"><h3>👤 By Rep / Channel</h3><div id="reps-list"></div></div>
    </div>
  `;

  // Today count
  const todayStr = new Date().toLocaleDateString("en-US");
  const todayRow = d.daily.find(r => new Date(r.day).toLocaleDateString("en-US") === todayStr);
  document.getElementById("today-kpi").textContent = todayRow ? todayRow.n : "0";

  // Daily bar chart
  new Chart(document.getElementById("dc"), {
    type: "bar",
    data: {
      labels: d.daily.map(r => {
        const dt = new Date(r.day);
        return (dt.getMonth()+1) + "/" + dt.getDate();
      }),
      datasets: [{label:"Cases", data: d.daily.map(r=>r.n), backgroundColor:"#1b1b1b", borderRadius:3}]
    },
    options: {plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
  });

  // Status doughnut
  const statusColors = ["#e5e7eb","#3b82f6","#cc0000","#f59e0b","#22c55e","#a855f7"];
  new Chart(document.getElementById("sc"), {
    type: "doughnut",
    data: {
      labels: d.statuses.map(s=>s.label),
      datasets: [{data: d.statuses.map(s=>s.n), backgroundColor: statusColors.slice(0, d.statuses.length)}]
    },
    options: {plugins:{legend:{position:"bottom"}}}
  });

  // Category horizontal bar
  const topCats = d.categories.slice(0,8);
  new Chart(document.getElementById("tc"), {
    type: "bar",
    data: {
      labels: topCats.map(c=>c.label),
      datasets: [{label:"Cases", data: topCats.map(c=>c.n), backgroundColor:"#cc0000", borderRadius:3}]
    },
    options: {indexAxis:"y", plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}}}
  });

  // Reps list
  const maxRep = Math.max(...d.reps.map(r=>r.n));
  document.getElementById("reps-list").innerHTML = d.reps.map(r =>
    `<div class="rep">
      <div class="rn">${r.name}</div>
      <div class="rb"><div class="rf" style="width:${Math.round(r.n/maxRep*100)}%"></div></div>
      <div class="rc">${r.n}</div>
    </div>`
  ).join("");
}

load();
// Auto-refresh every 5 minutes
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
